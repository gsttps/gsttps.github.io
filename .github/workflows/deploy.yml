# Deploy automático a GitHub Pages en cada push a main.
# Fuente: https://vitejs.dev/guide/static-deploy.html#github-pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permite lanzar el workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos mínimos necesarios para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; cancela el anterior si llega uno nuevo
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
