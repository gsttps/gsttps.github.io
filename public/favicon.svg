<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Glow filter para el efecto neón -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="32" height="32" rx="4" fill="#0a0a0f"/>

  <!-- Borde cian sutil -->
  <rect width="32" height="32" rx="4" fill="none" stroke="#00fff2" stroke-width="0.8" opacity="0.45"/>

  <!-- Prompt > en neón cian -->
  <polyline
    points="5,9 15,16 5,23"
    fill="none"
    stroke="#00fff2"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-cyan)"
  />

  <!-- Cursor bloque en magenta -->
  <rect
    x="18" y="20"
    width="9" height="3.5"
    rx="0.5"
    fill="#ff00e6"
    filter="url(#glow-magenta)"
  />
</svg>
